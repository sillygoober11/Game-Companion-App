<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Character Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background: #f4f4f4;
        }

        #searchBox {
            padding: 10px;
            width: 250px;
            font-size: 16px;
        }

        #searchBtn {
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
        }

        .card {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 8px;
            width: 300px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .card h2 {
            margin-top: 0;
        }
    </style>
</head>
<body>

    <h1>Character Search</h1>

    <input type="text" id="searchBox" placeholder="Enter character name">
    <button id="searchBtn">Search</button>

    <div id="result"></div>

    <script>
        // Hardcoded character data
        const characters = [
            { name: "Aragon", class: "Warrior", level: 12, hp: 180 },
            { name: "Lyra", class: "Mage", level: 15, hp: 120 },
            { name: "Thorn", class: "Rogue", level: 10, hp: 140 },
            { name: "Selene", class: "Archer", level: 14, hp: 150 }
        ];

        document.getElementById("searchBtn").addEventListener("click", () => {
            const query = document.getElementById("searchBox").value.trim().toLowerCase();
            const resultDiv = document.getElementById("result");

            const found = characters.find(c => c.name.toLowerCase() === query);

            if (found) {
                resultDiv.innerHTML = `
                    <div class="card">
                        <h2>${found.name}</h2>
                        <p><strong>Class:</strong> ${found.class}</p>
                        <p><strong>Level
